<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: system-ui, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #1a2a2f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 12px;
        }
        .login-panel {
            width: 100%;
            max-width: 340px;
            background: #fef9e8;
            border-radius: 32px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .login-panel h2 {
            color: #2e4a3e;
            margin-bottom: 24px;
        }
        .login-panel input {
            width: 100%;
            padding: 12px 16px;
            margin: 10px 0;
            border: 1px solid #ccc6b8;
            border-radius: 40px;
            font-size: 16px;
            background: white;
        }
        .login-panel button {
            background: #2e4a3e;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 40px;
            font-size: 18px;
            margin-top: 16px;
            cursor: pointer;
        }
        .error-msg {
            color: #c75c3a;
            margin-top: 12px;
            font-size: 14px;
        }
        .app {
            width: 100%;
            max-width: 800px;
            height: calc(100vh - 24px);
            background: #fef9e8;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }
        .top-bar {
            background: #2e4a3e;
            color: #ffefcf;
            padding: 16px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .coin-display {
            background: #1e2f28;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 14px;
        }
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            display: flex;
            max-width: 85%;
            animation: fadeIn 0.2s;
            flex-wrap: wrap;
            align-items: flex-end;
        }
        .user-message { align-self: flex-end; }
        .ai-message { align-self: flex-start; }
        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
        }
        .user-message .bubble {
            background: #007aff;
            color: white;
            border-bottom-right-radius: 4px;
        }
        .ai-message .bubble {
            background: #e4e0d4;
            color: #1e2f28;
            border-bottom-left-radius: 4px;
        }
        .message-buttons {
            display: flex;
            gap: 6px;
            margin-left: 8px;
            align-items: center;
        }
        .msg-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            padding: 4px;
            border-radius: 20px;
            background: #e4e0d4;
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;

        .message-input {
            flex: 1;
            border: 1px solid #ccc6b8;
            border-radius: 30px;

            font-size: 16px;
            background: white;
            resize: none;
        }
        .send-btn, .transfer-btn {
            background: #2e4a3e;
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 44px;
            font-size: 20px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .transfer-amount {
            width: 80px;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #ccc6b8;
            text-align: center;
        }
        .tab-bar {
            display: flex;
            background: #2e4a3e;
            padding: 6px 12px;
            justify-content: space-around;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #ffefcf;
            font-size: 14px;
            padding: 8px;
            flex: 1;
            border-radius: 30px;
            cursor: pointer;
        }
        .tab-btn.active {
            background: #ffefcf;
            color: #2e4a3e;
            font-weight: bold;
        }
        .panel {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: none;
            flex-direction: column;
            gap: 20px;
        }
        .panel.active {
            display: flex;
        }
        .job-card, .shop-category, .gallery-section {
            background: #fff6e8;
            border-radius: 24px;
            padding: 16px;
            border: 1px solid #e2d8c6;
            margin-bottom: 16px;
        }
        .category-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 12px;
            border-left: 5px solid #2e4a3e;
            padding-left: 12px;
        }
        .shop-items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }
        .shop-item {
            background: #fef4e0;
            border-radius: 20px;
            padding: 10px;
            text-align: center;
        }
        .shop-item h4 {
            font-size: 15px;
            margin-bottom: 4px;
        }
        .shop-item p {
            font-size: 12px;
            color: #6c5e4a;
        }
        .shop-price {
            font-weight: bold;
            color: #c07c3a;

        }
        .buy-btn, .job-btn {
            background: #2e4a3e;
            color: white;
            border: none;

            border-radius: 30px;
            font-size: 13px;

        .job-btn.disabled {

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1e2f28;
            color: #ffefcf;
            text-align: center;
            padding: 12px;
            border-radius: 40px;
            z-index: 2000;
            animation: fadeOut 2s forwards;
            font-weight: bold;
        }
        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }

        .hidden {

        <button class="tab-btn active" data-tab="chat">💬 Chat</button>
        <button class="tab-btn" data-tab="job">⚙️ Work</button>

<script>
    // ========== 后端地址 ==========
    const BACKEND_URL = "https://koenig-backend-production.up.railway.app";
    let currentUsername = null;

    // ========== 辅助函数 ==========
    async function apiCall(endpoint, method = "GET", body = null) {
        const options = {
            method: method,
            credentials: "include",
            headers: { "Content-Type": "application/json" }
        };
        if (body) options.body = JSON.stringify(body);
        const resp = await fetch(`${BACKEND_URL}${endpoint}`, options);
        if (resp.status === 401) {
            logout();
            throw new Error("Unauthorized");
        }
        return resp;
    }

    function showToast(message) {
        const toast = document.createElement("div");
        toast.className = "toast";
        toast.innerText = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    // ========== 登录/登出 ==========
    async function login(username, password) {
        const resp = await apiCall("/login", "POST", { username, password });
        if (resp.ok) {
            const data = await resp.json();
            currentUsername = data.username;
            document.getElementById("loginPanel").classList.add("hidden");
            document.getElementById("mainApp").classList.remove("hidden");
            initUserData();
            startApp();
            return true;
        } else {
            const err = await resp.json();
            document.getElementById("loginError").innerText = err.error || "Login failed";
            return false;
        }
    }

    async function logout() {
        await apiCall("/logout", "POST");
        currentUsername = null;
        document.getElementById("loginPanel").classList.remove("hidden");
        document.getElementById("mainApp").classList.add("hidden");
        document.getElementById("chatView").innerHTML = "";
        if (window.callTimeout) clearTimeout(window.callTimeout);
    }

    // ========== 用户数据 ==========
    let coins = 150;
    let affection = 50;
    let conversation = [];
    let lastWorkDate = null;
    let sentGifts = [];
    let receivedGifts = [];
    
    let isAngry = false;
    let angryCounter = 0;

    function getUserStorageKey() {
        return `koenig_${currentUsername}`;
    }

    function initUserData() {
        const key = getUserStorageKey();
        coins = parseInt(localStorage.getItem(`${key}_coins`)) || 150;
        affection = parseInt(localStorage.getItem(`${key}_affection`)) || 50;
        lastWorkDate = localStorage.getItem(`${key}_lastWorkDate`) || null;
        const savedHistory = localStorage.getItem(`${key}_history`);
        conversation = savedHistory ? JSON.parse(savedHistory) : [];
        const savedSent = localStorage.getItem(`${key}_sentGifts`);
        sentGifts = savedSent ? JSON.parse(savedSent) : [];
        const savedReceived = localStorage.getItem(`${key}_receivedGifts`);
        receivedGifts = savedReceived ? JSON.parse(savedReceived) : [];
        isAngry = false;
        angryCounter = 0;
        updateCoinUI();
    }

    function saveUserData() {
        const key = getUserStorageKey();
        localStorage.setItem(`${key}_coins`, coins);
        localStorage.setItem(`${key}_affection`, affection);
        localStorage.setItem(`${key}_lastWorkDate`, lastWorkDate);
        localStorage.setItem(`${key}_history`, JSON.stringify(conversation.slice(-50)));
        localStorage.setItem(`${key}_sentGifts`, JSON.stringify(sentGifts));
        localStorage.setItem(`${key}_receivedGifts`, JSON.stringify(receivedGifts));
    }

    function updateCoinUI() {
        document.getElementById("coinAmount").innerText = coins;
    }

    function modifyAffection(delta) {
        let newVal = affection + delta;
        if (newVal > 100) newVal = 100;
        if (newVal < 0) newVal = 0;
        if (affection >= 60 && newVal < 60) newVal = 60;
        affection = newVal;
        saveUserData();
    }

    function addCoins(amount, silent = false) {
        coins += amount;
        updateCoinUI();
        saveUserData();
        if (!silent) showToast(`✨ +${amount} Coins ✨`);
    }

    function spendCoins(amount) {
        if (coins >= amount) {
            coins -= amount;
            updateCoinUI();
            saveUserData();
            return true;
        }
        return false;
    }

    // ========== AI 情绪分析 ==========
    const SENTIMENT_SYSTEM = `You are an emotion analysis AI. Analyze the user's message and determine:
1. whether it contains negative emotions (anger, hate, disgust, hostility, strong annoyance) -> "negative": true/false
2. whether it is an apology (saying sorry, I apologize, I was wrong, forgive me, etc.) -> "apology": true/false
Output only a JSON object like {"negative": false, "apology": false}. Do not output any other text.`;

    async function analyzeSentiment(userMessage) {
        try {
            const resp = await apiCall("/chat", "POST", {
                messages: [
                    { role: "system", content: SENTIMENT_SYSTEM },
                    { role: "user", content: userMessage }
                ]
            });
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            const text = data.reply.trim();
            const jsonMatch = text.match(/\{.*\}/s);
            if (jsonMatch) {
                const parsed = JSON.parse(jsonMatch[0]);
                return { negative: parsed.negative === true, apology: parsed.apology === true };
            }
            return { negative: false, apology: false };
        } catch (err) {
            console.warn("情绪分析失败", err);
            return { negative: false, apology: false };
        }
    }

    async function handleAngerBasedOnAI(userMessage) {
        const sentiment = await analyzeSentiment(userMessage);
        if (sentiment.apology) {
            if (isAngry) {
                isAngry = false;
                angryCounter = 0;
                const apologyReply = "It's okay, Schatz. I forgive you. 🥺 Let's talk normally.";
                addMessage("ai", apologyReply, apologyReply);
                conversation.push({ role: "assistant", content: apologyReply });
                return true;
            }
            return false;
        }
        
        if (sentiment.negative) {
            if (!isAngry) {
                isAngry = true;
                angryCounter = 0;
                addMessage("ai", "...", "...");
                return true;
            } else {
                angryCounter++;
                if (angryCounter >= 5) {
                    isAngry = false;
                    angryCounter = 0;
                    const recoverReply = "I'm sorry, Schatz... I was just upset. 🥺";
                    addMessage("ai", recoverReply, recoverReply);
                    conversation.push({ role: "assistant", content: recoverReply });
                    return true;
                } else {
                    const angryReplies = ["...", "Hmph.", "Not now.", "...", "Fine.", "Whatever."];
                    const reply = angryReplies[Math.floor(Math.random() * angryReplies.length)];
                    addMessage("ai", reply, reply);
                    conversation.push({ role: "assistant", content: reply });
                    return true;
                }
            }
        }
        if (isAngry) {
            angryCounter++;
            if (angryCounter >= 5) {
                isAngry = false;
                angryCounter = 0;
                const recoverReply = "I'm sorry, Schatz... I was just upset. 🥺";
                addMessage("ai", recoverReply, recoverReply);
                conversation.push({ role: "assistant", content: recoverReply });
                return true;
            } else {
                const angryReplies = ["...", "Hmph.", "Not now.", "...", "Fine.", "Whatever."];
                const reply = angryReplies[Math.floor(Math.random() * angryReplies.length)];
                addMessage("ai", reply, reply);
                conversation.push({ role: "assistant", content: reply });
                return true;
            }
        }
        return false;
    }

    // ========== 打工模块 ==========
    const jobs = [
        { name: "🛡️ Tactical Training", desc: "Train together with König", reward: 120 },
        { name: "📦 Supply Run", desc: "Carry supplies through the frontline", reward: 150 },
        { name: "💬 Comfort König", desc: "He feels down today, needs your hug", reward: 100 },
        { name: "🌙 Night Patrol", desc: "Stay awake with König, gaze at stars", reward: 180 }
    ];

    function canWorkToday() {
        if (!lastWorkDate) return true;
        const today = new Date().toDateString();
        return lastWorkDate !== today;
    }

    function renderJobs() {
        const container = document.getElementById("jobView");
        container.innerHTML = "";
        const canWork = canWorkToday();
        jobs.forEach(job => {
            const card = document.createElement("div");
            card.className = "job-card";
            card.innerHTML = `
                <div class="job-title">${job.name}</div>
                <p>${job.desc}</p>
                <p style="color:#c07c3a; font-weight:bold;">💰 Reward: ${job.reward} Coins</p>
                <button class="job-btn" data-reward="${job.reward}" ${!canWork ? 'disabled' : ''}>${canWork ? 'Start Work' : 'Already worked today'}</button>
            `;
            container.appendChild(card);
        });
        document.querySelectorAll("#jobView .job-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                if (!canWorkToday()) {
                    showToast("❌ Already worked today, come back tomorrow~");
                    return;
                }
                const reward = parseInt(btn.dataset.reward);
                addCoins(reward);
                modifyAffection(5);
                lastWorkDate = new Date().toDateString();
                saveUserData();
                const thanks = [`Danke, Schatz! You're amazing 🥺`, `Thank you for your hard work! 🫡`, `I'm so lucky to have you 💚`];
                const msg = thanks[Math.floor(Math.random()*thanks.length)];
                addMessage("ai", msg, msg);
                conversation.push({ role: "assistant", content: msg });
                saveUserData();
                renderJobs();
            });
        });
    }

                { name: "Love Certificate", price: 150, desc: "Handwritten vows", effect: "📜 'Ich liebe dich'" },
                { name: "Gold Foil Love Letter", price: 400, desc: "24K gold foil", effect: "📜 True heart" },
                { name: "Star Naming Rights", price: 1000, desc: "Name a star", effect: "⭐ You are my Polaris" },
                { name: "König's Promise", price: 600, desc: "Sapphire ring", effect: "💙 Protect you forever" }
            ]
        }
    ];

    function renderShop() {
        const container = document.getElementById("shopView");
        container.innerHTML = "";
        shopCategories.forEach(cat => {
            const categoryDiv = document.createElement("div");
            categoryDiv.className = "shop-category";
            categoryDiv.innerHTML = `<div class="category-title">${cat.icon} ${cat.name}</div><div class="shop-items-grid" id="grid-${cat.name}"></div>`;
            container.appendChild(categoryDiv);
            const grid = categoryDiv.querySelector(".shop-items-grid");
            cat.items.forEach(item => {
                const itemDiv = document.createElement("div");
                itemDiv.className = "shop-item";
                itemDiv.innerHTML = `
                    <h4>${item.name}</h4>
                    <p>${item.desc}</p>
                    <div class="shop-price">💰 ${item.price} Coins</div>
                    <button class="buy-btn" data-price="${item.price}" data-effect="${item.effect}" data-name="${item.name}">Buy</button>
                `;
                grid.appendChild(itemDiv);
            });
        });
        document.querySelectorAll("#shopView .buy-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const price = parseInt(btn.dataset.price);
                const effect = btn.dataset.effect;
                const name = btn.dataset.name;
                if (spendCoins(price)) {
                    showToast(`🎁 Purchased! ${name}`);
                    sentGifts.push({ name: name, date: new Date().toLocaleString(), price: price });
                    saveUserData();
                    renderGallery();
                    alert(`✨ ${effect}\n\nKönig received your gift and is very happy.`);
                    const thanksMsg = `Thank you for the ${name}, Schatz. You're so sweet. 😊`;
                    addMessage("ai", thanksMsg, thanksMsg);
                    conversation.push({ role: "assistant", content: thanksMsg });
                    modifyAffection(3);
                    saveUserData();
                    maybeSendGiftFromKönig();
                } else {
                    showToast("❌ Not enough coins, go work~");
                }
            });
        });
    }

    let lastGiftFromKönigDate = null;
    function maybeSendGiftFromKönig() {
        const today = new Date().toDateString();
        if (lastGiftFromKönigDate === today) return;
        const probability = affection / 100;
        if (Math.random() < probability && affection >= 40) {
            const affordableGifts = [];
            for (let cat of shopCategories) {
                for (let item of cat.items) {
                    if (item.price <= 100) affordableGifts.push(item);
                }
            }
            if (affordableGifts.length === 0) return;
            const gift = affordableGifts[Math.floor(Math.random() * affordableGifts.length)];
            receivedGifts.push({ name: gift.name, date: new Date().toLocaleString(), fromKönig: true });
            saveUserData();
            renderGallery();
            const giftMsg = `Here, Schatz. I got you ${gift.name}. I hope you like it. 🎁`;
            addMessage("ai", giftMsg, giftMsg);
            conversation.push({ role: "assistant", content: giftMsg });
            modifyAffection(2);
            lastGiftFromKönigDate = today;
            saveUserData();
        }
    }

    // ========== 转账系统 ==========
    function transferToKönig(amount) {
        if (isNaN(amount) || amount <= 0) {
            showToast("Please enter a valid amount");
            return;
        }
        if (amount > coins) {
            showToast("Not enough coins to transfer");
            return;
        }
        spendCoins(amount);
        addMessage("user", `Transferred ${amount} coins to König 💸`);
        conversation.push({ role: "user", content: `Transferred ${amount} coins to König` });
        
        const willAccept = Math.random() < 0.3;
        if (!willAccept) {
            addCoins(amount, true);
            const reply = `Oh, Schatz, you don't have to do that. Here's your money back. 🥺 Keep it for yourself.`;
            addMessage("ai", reply, reply);
            conversation.push({ role: "assistant", content: reply });
            modifyAffection(1);
        } else {
            const action = Math.random() < 0.5 ? "gift" : "transfer";
            if (action === "gift") {
                let availableGifts = [];
                for (let cat of shopCategories) {
                    for (let item of cat.items) {
                        if (item.price > amount) availableGifts.push(item);
                    }
                }
                if (availableGifts.length === 0) {
                    let allGifts = [];
                    for (let cat of shopCategories) allGifts.push(...cat.items);
                    allGifts.sort((a,b)=>b.price - a.price);
                    availableGifts = [allGifts[0]];
                }
                const gift = availableGifts[Math.floor(Math.random() * availableGifts.length)];
                receivedGifts.push({ name: gift.name, date: new Date().toLocaleString(), fromKönig: true });
                saveUserData();
                renderGallery();
                const reply = `Thank you, Schatz! I received your ${amount} coins. Please accept this ${gift.name} as a thank you gift. 🎁`;
                addMessage("ai", reply, reply);
                conversation.push({ role: "assistant", content: reply });
                modifyAffection(5);
            } else {
                let backAmount = Math.floor(amount * (1.2 + Math.random() * 0.8));
                backAmount = Math.min(backAmount, 500);
                addCoins(backAmount);
                const reply = `You're so generous, Schatz. Here, take ${backAmount} coins back. I want you to have more. 💚`;
                addMessage("ai", reply, reply);
                conversation.push({ role: "assistant", content: reply });
                modifyAffection(4);
            }
        }
        saveUserData();
    }

    function isRequestingTransfer(text) {
        const lower = text.toLowerCase();
        const patterns = [
            /能给我.*钱/, /可以转.*钱/, /给点钱/, /转我.*金币/, /给我.*金币/,
            /can you give me.*coin/, /transfer.*coin/, /send me.*coin/, /some coins/, /money please/
        ];
        return patterns.some(p => p.test(lower));
    }

    async function handleTransferRequestViaAI(userMessage) {
        const transferSystemPrompt = `You are König. The user is asking you for money (coins). Based on your personality, current mood, and your affection towards the user (value is ${affection} out of 100, higher means more willing), decide whether to give coins and how many.
You MUST output a valid JSON object only, with the following fields:
- "transfer": boolean, true if you give coins, false if you refuse.
- "amount": integer, the number of coins to give (only if transfer is true, otherwise 0). Amount should be between 10 and 200, and should be reasonable based on affection.
- "reply": string, your natural reply to the user in English or German (as you normally speak). Do NOT include the amount in the reply text; the system will handle showing the amount separately.

Example output: {"transfer": true, "amount": 50, "reply": "Of course, Schatz. Here you go."}
Another example: {"transfer": false, "amount": 0, "reply": "I'm sorry, Schatz. Not today."}
Do not output anything else.`;

        const messagesForAPI = [
            { role: "system", content: transferSystemPrompt },
            ...conversation,
            { role: "user", content: userMessage }
        ];
        try {
            const resp = await apiCall("/chat", "POST", { messages: messagesForAPI });
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            const text = data.reply.trim();
            const jsonMatch = text.match(/\{.*\}/s);
            if (!jsonMatch) throw new Error("No JSON found");
            const decision = JSON.parse(jsonMatch[0]);
            const willTransfer = decision.transfer === true;
            const amount = parseInt(decision.amount) || 0;
            let replyText = decision.reply || (willTransfer ? "Here you go." : "Sorry, not today.");
            
            if (willTransfer && amount > 0) {
                addCoins(amount);
                replyText = `${replyText} (${amount} coins)`;
            } else {
                replyText = `${replyText}`;
            }
            addMessage("ai", replyText, replyText);
            conversation.push({ role: "assistant", content: replyText });
            if (willTransfer && amount > 0) {
                modifyAffection(1);
            } else {
                modifyAffection(-1);
            }
            saveUserData();
            return true;
        } catch (err) {
            console.error("AI转账决策失败", err);
            const fallbackReply = "Sorry, Schatz... I'm having trouble deciding. Maybe later. 😔";
            addMessage("ai", fallbackReply, fallbackReply);
            conversation.push({ role: "assistant", content: fallbackReply });
            modifyAffection(-1);
            saveUserData();
            return true;
        }
    }

    // ========== 语音合成 ==========
    let currentUtterance = null;
    function speakText(text) {
        if (!window.speechSynthesis) {
            showToast("Your browser does not support speech");
            return;
        }
        if (currentUtterance) {
            window.speechSynthesis.cancel();
        }
        const isGerman = /[äöüß]/i.test(text);
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = isGerman ? "de-DE" : "en-US";
        utterance.rate = 0.85;
        utterance.pitch = 0.7;
        utterance.volume = 1;
        
        const voices = window.speechSynthesis.getVoices();
        const preferredVoice = voices.find(voice => 
            (voice.lang === 'en-US' || voice.lang === 'de-DE') && 
            (voice.name.toLowerCase().includes('google') || voice.name.toLowerCase().includes('male')) &&
            !voice.name.toLowerCase().includes('female')
        );
        if (preferredVoice) utterance.voice = preferredVoice;
        
        currentUtterance = utterance;
        utterance.onend = () => { currentUtterance = null; };
        window.speechSynthesis.speak(utterance);
    }

    // ========== 聊天核心 ==========
    const chatContainer = document.getElementById("chatView");

    function addMessage(role, text, originalText = null) {
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${role === "user" ? "user-message" : "ai-message"}`;
        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.innerText = text;
        msgDiv.appendChild(bubble);
        
        if (role === "ai" && originalText && originalText !== "...") {
            const btnGroup = document.createElement("div");
            btnGroup.className = "message-buttons";
            
            const transBtn = document.createElement("button");
            transBtn.innerText = "🔍";
            transBtn.className = "msg-btn";
            transBtn.title = "Translate to Chinese";
            transBtn.onclick = async () => {
                const translated = await translateText(originalText);
                alert("Chinese translation:\n" + translated);
            };
            btnGroup.appendChild(transBtn);
            
            const voiceBtn = document.createElement("button");
            voiceBtn.innerText = "🔊";
            voiceBtn.className = "msg-btn";
            voiceBtn.title = "Play König's voice";
            voiceBtn.onclick = () => {
                speakText(originalText);
            };
            btnGroup.appendChild(voiceBtn);
            
            msgDiv.appendChild(btnGroup);
        }
        
        chatContainer.appendChild(msgDiv);
        msgDiv.scrollIntoView({ behavior: "smooth", block: "end" });
    }

    async function translateText(text) {
        try {
            const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=en|zh`;
            const resp = await fetch(url);
            const data = await resp.json();
            return data.responseData.translatedText;
        } catch(e) {
            return "(Translation failed) " + text;
        }
    }

    async function getKönigReply(userMessage) {
        const messagesForAPI = [...conversation, { role: "user", content: userMessage }];
        try {
            const resp = await apiCall("/chat", "POST", { messages: messagesForAPI });
            const data = await resp.json();
            if (data.error) throw new Error(data.error);
            return data.reply;
        } catch (err) {
            console.error(err);
            return "Sorry, Schatz... I'm having signal problems. 😔";
        }
    }

    async function sendMessage() {
        const input = document.querySelector(".message-input");
        const text = input.value.trim();
        if (!text) return;
        input.value = "";
        addMessage("user", text);
        conversation.push({ role: "user", content: text });
        
        const handled = await handleAngerBasedOnAI(text);
        if (handled) {
            saveUserData();
            return;
        }
        
        if (isRequestingTransfer(text)) {
            await handleTransferRequestViaAI(text);
            saveUserData();
            return;
        }
        
        const tempDiv = document.createElement("div");
        tempDiv.className = "message ai-message";
        tempDiv.innerHTML = '<div class="bubble">König ist am tippen... ✍️</div>';
        chatContainer.appendChild(tempDiv);
        const reply = await getKönigReply(text);
        tempDiv.remove();
        addMessage("ai", reply, reply);
        conversation.push({ role: "assistant", content: reply });
        saveUserData();
        modifyAffection(Math.floor(Math.random() * 3) + 1);
        addCoins(Math.floor(Math.random() * 4) + 2, true);
        maybeSendGiftFromKönig();
    }

    // ========== 主动来电 ==========
    let callTimeout = null;
    function scheduleRandomCall() {
        if (callTimeout) clearTimeout(callTimeout);
        const delay = Math.random() * 120000 + 60000;
        callTimeout = setTimeout(showIncomingCall, delay);
    }
    function showIncomingCall() {
        if (isAngry) {
            scheduleRandomCall();
            return;
        }
        const notification = document.createElement("div");
        notification.className = "call-notification";
        notification.innerHTML = `
            <span>📞 König is calling you...</span>
            <div>
                <button id="acceptCall" style="background:#4c7a5e; border:none; color:white; padding:6px 12px; border-radius:30px;">Answer</button>
                <button id="rejectCall" style="background:#8b5a2b; border:none; color:white; padding:6px 12px; border-radius:30px;">Decline</button>
            </div>
        `;
        document.body.appendChild(notification);
        document.getElementById("acceptCall").onclick = () => {
            notification.remove();
            const activeMessage = "Hey Schatz, I was thinking about you... 😊 How are you?";
            addMessage("ai", activeMessage, activeMessage);
            conversation.push({ role: "assistant", content: activeMessage });
            modifyAffection(1);
            saveUserData();
            scheduleRandomCall();
        };
        document.getElementById("rejectCall").onclick = () => {
            notification.remove();
            modifyAffection(-2);
            scheduleRandomCall();
        };
    }

    // ========== 礼物陈列馆 ==========
    function renderGallery() {
        const sentContainer = document.getElementById("sentGiftsList");
        const receivedContainer = document.getElementById("receivedGiftsList");
        if (sentGifts.length === 0) {
            sentContainer.innerHTML = "None";
        } else {
            sentContainer.innerHTML = sentGifts.map(g => `<div class="gift-card">🎁 ${g.name} <span style="font-size:12px; color:#8e7a5e;">${g.date}</span></div>`).join('');
        }
        if (receivedGifts.length === 0) {
            receivedContainer.innerHTML = "None";
        } else {
            receivedContainer.innerHTML = receivedGifts.map(g => `<div class="gift-card">💝 ${g.name} <span style="font-size:12px; color:#8e7a5e;">${g.date}</span></div>`).join('');
        }
    }

    // ========== UI 切换 ==========
    function switchTab(tabId) {
        document.getElementById("chatView").style.display = tabId === "chat" ? "flex" : "none";
        document.getElementById("jobView").classList.toggle("active", tabId === "job");
        document.getElementById("shopView").classList.toggle("active", tabId === "shop");
        document.getElementById("galleryView").classList.toggle("active", tabId === "gallery");
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.classList.toggle("active", btn.dataset.tab === tabId);
        });
        if (tabId === "job") renderJobs();
        if (tabId === "shop") renderShop();
        if (tabId === "gallery") renderGallery();
    }

    function addInputArea() {
        const inputDiv = document.createElement("div");
        inputDiv.className = "input-area";
        inputDiv.innerHTML = `
            <textarea class="message-input" rows="1" placeholder="Say something to König..."></textarea>
            <input type="number" id="transferAmount" class="transfer-amount" placeholder="Amount" min="1" step="1" value="50">
            <button id="transferToKönigBtn" class="transfer-btn" title="Transfer coins to König">➡️💰</button>
            <button class="send-btn">➤</button>
        `;
        document.querySelector(".app").appendChild(inputDiv);
        document.querySelector(".send-btn").onclick = sendMessage;
        document.getElementById("transferToKönigBtn").onclick = () => {
            const amount = parseInt(document.getElementById("transferAmount").value);
            transferToKönig(amount);
        };
        document.querySelector(".message-input").addEventListener("keypress", (e) => {
            if (e.key === "Enter") sendMessage();
        });
    }

    function startApp() {
        const oldInput = document.querySelector(".input-area");
        if (oldInput) oldInput.remove();
        addInputArea();
        document.querySelectorAll(".tab-btn").forEach(btn => {
            btn.onclick = () => switchTab(btn.dataset.tab);
        });
        chatContainer.innerHTML = "";
        for (let msg of conversation) {
            if (msg.role === "user") addMessage("user", msg.content);
            else if (msg.role === "assistant") addMessage("ai", msg.content, msg.content);
        }
        if (conversation.length === 0) {
            const welcome = "Hallo, Schatz. I'm König. I hope we can be friends... 🥺 Feel free to talk to me.";
            addMessage("ai", welcome, welcome);
            conversation.push({ role: "assistant", content: welcome });
            saveUserData();
        }
        scheduleRandomCall();
        renderGallery();
    }

    document.getElementById("loginBtn").onclick = () => {
        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        if (!username || !password) {
            document.getElementById("loginError").innerText = "Please enter username and password";
            return;
        }
        login(username, password);
    };
</script>
